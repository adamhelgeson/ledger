version: "3.9"

# ── Ledger — The All-Father's Treasury ────────────────────────────────────────
# Local-first deployment for media server or home lab.
# Usage: docker-compose up -d
# ──────────────────────────────────────────────────────────────────────────────

services:
  ledger-api:
    build:
      context: .
      dockerfile: src/Ledger.Api/Dockerfile
    container_name: ledger-api
    ports:
      - "5050:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - DataDir=/app/data
      - AllowedOrigins__0=http://localhost:3000
    volumes:
      - ledger-data:/app/data
    restart: unless-stopped

  ledger-client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: ledger-client
    ports:
      - "3000:80"
    depends_on:
      - ledger-api
    environment:
      - VITE_API_BASE_URL=http://ledger-api:5050
    restart: unless-stopped

volumes:
  ledger-data:
    driver: local
