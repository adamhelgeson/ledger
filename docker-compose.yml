services:
  api:
    build:
      context: .
      target: api
    container_name: ledger-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      DataDir: /app/data
      Heimdall__ApiKey: ${ANTHROPIC_API_KEY:-}
    volumes:
      - ledger-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5050/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - ledger-net

  web:
    build:
      context: .
      target: web
    container_name: ledger-web
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - ledger-net

volumes:
  ledger-data:
    name: ledger-data

networks:
  ledger-net:
    name: ledger-net
